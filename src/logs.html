<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Diagnostics</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Consolas', 'Cascadia Code', monospace;
    font-size: 12px;
    background: #1a1a2e;
    color: #cdd6f4;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .toolbar {
    display: flex;
    gap: 8px;
    padding: 8px 12px;
    background: #2a2a3e;
    border-bottom: 1px solid #3a3a4e;
    flex-shrink: 0;
    align-items: center;
  }
  select, button {
    background: #3a3a4e; color: #cdd6f4; border: none;
    border-radius: 5px; padding: 4px 10px; font-size: 12px; cursor: pointer;
  }
  button:hover { background: #4a4a5e; }
  .log { flex: 1; overflow-y: auto; padding: 8px 12px; }
  .entry { padding: 1px 0; white-space: pre-wrap; word-break: break-all; }
  .DEBUG   { color: #6c7086; }
  .INFO    { color: #cdd6f4; }
  .WARNING { color: #facc15; }
  .ERROR   { color: #f87171; }
</style>
</head>
<body>
<div class="toolbar">
  <select id="filter">
    <option value="">All</option>
    <option value="INFO">INFO+</option>
    <option value="WARNING">WARNING+</option>
    <option value="ERROR">ERROR</option>
  </select>
  <button id="diagBtn">Run Connection Test</button>
  <button id="copyBtn">Copy All</button>
  <button id="clearBtn">Clear</button>
  <span style="color:#6c7086;margin-left:auto" id="count"></span>
</div>
<div class="log" id="log"></div>
<script>
const { ipcRenderer } = require('electron');
let allLogs = [];
const LEVELS = { DEBUG:0, INFO:1, WARNING:2, ERROR:3 };

function addEntry(level, msg) {
  allLogs.push({ ts: new Date().toISOString(), level, msg });
  render();
}

function render() {
  const filter = document.getElementById('filter').value;
  const floor = LEVELS[filter] ?? 0;
  const container = document.getElementById('log');
  container.innerHTML = '';
  const filtered = allLogs.filter(e => (LEVELS[e.level] ?? 0) >= floor);
  filtered.forEach(e => {
    const div = document.createElement('div');
    div.className = 'entry ' + e.level;
    div.textContent = `[${e.ts.slice(11,19)}] [${e.level.padEnd(7)}] ${e.msg}`;
    container.appendChild(div);
  });
  container.scrollTop = container.scrollHeight;
  document.getElementById('count').textContent = filtered.length + ' entries';
}

ipcRenderer.on('logs', (_e, logs) => { allLogs = logs; render(); });
document.getElementById('filter').addEventListener('change', render);
document.getElementById('clearBtn').addEventListener('click', () => { allLogs = []; render(); });
document.getElementById('copyBtn').addEventListener('click', () => {
  const text = allLogs.map(e => `[${e.ts}] [${e.level}] ${e.msg}`).join('\n');
  navigator.clipboard.writeText(text);
});

// ── Connection test ────────────────────────────────────────────────────────
document.getElementById('diagBtn').addEventListener('click', async () => {
  const btn = document.getElementById('diagBtn');
  btn.disabled = true;
  addEntry('INFO', '── Connection Test ──────────────────────────');

  const tests = [
    { url: 'https://claude.ai', label: 'claude.ai reachability' },
    { url: 'https://claude.ai/api/organizations', label: 'API endpoint (expects 401/403, not Cloudflare)' },
  ];

  for (const t of tests) {
    const t0 = Date.now();
    try {
      const res = await fetch(t.url, { method: 'HEAD' });
      const ms = Date.now() - t0;
      const isCloudflare = res.headers.get('cf-ray') !== null;
      const level = res.ok || res.status === 401 || res.status === 403 ? 'INFO' : 'WARNING';
      addEntry(level, `${t.label}: HTTP ${res.status} (${ms}ms)${isCloudflare ? ' [Cloudflare]' : ''}`);
    } catch (err) {
      addEntry('ERROR', `${t.label}: ${err.message}`);
    }
  }

  addEntry('INFO', '── Done ─────────────────────────────────────');
  btn.disabled = false;
});
</script>
</body>
</html>
