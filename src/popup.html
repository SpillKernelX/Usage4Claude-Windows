<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
<title>Claude Usage</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #ffffff;
    --card-bg:    #ffffff;
    --border:     rgba(0,0,0,0.08);
    --row-bg:     #f5f5f7;
    --row-hover:  #ebebed;
    --text:       #1d1d1f;
    --subtext:    #6e6e73;
    --accent:     #007aff;
    --shadow:     0 8px 32px rgba(0,0,0,0.14), 0 2px 8px rgba(0,0,0,0.08);
    --radius:     18px;
    --ring-track: #e5e5ea;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:        #1c1c1e;
      --card-bg:   #1c1c1e;
      --border:    rgba(255,255,255,0.1);
      --row-bg:    #2c2c2e;
      --row-hover: #3a3a3c;
      --text:      #f5f5f7;
      --subtext:   #8e8e93;
      --ring-track:#3a3a3c;
    }
  }

  body {
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    background: transparent;
    width: 320px;
    user-select: none;
    -webkit-app-region: no-drag;
  }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    overflow: hidden;
    margin: 8px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    padding: 14px 16px 10px;
    gap: 8px;
    -webkit-app-region: drag;
  }

  .header-icon {
    width: 28px; height: 28px;
    border-radius: 7px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .header-icon img { width: 28px; height: 28px; display: block; }

  .header-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }

  .header-account {
    font-size: 11px;
    color: var(--subtext);
    max-width: 90px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .header-btns {
    display: flex;
    gap: 4px;
  }

  .icon-btn {
    width: 28px; height: 28px;
    border-radius: 7px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--subtext);
    transition: background 0.15s;
    -webkit-app-region: no-drag;
  }
  .icon-btn:hover { background: var(--row-bg); color: var(--text); }
  .icon-btn svg { width: 16px; height: 16px; }
  .icon-btn.spinning svg { animation: spin 1s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Ring chart ── */
  .ring-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4px 16px 16px;
  }

  .ring-wrap {
    position: relative;
    width: 140px; height: 140px;
  }

  .ring-wrap svg {
    width: 140px; height: 140px;
    transform: rotate(-90deg);
  }

  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .ring-pct {
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    white-space: nowrap;
  }
  .ring-pct.pct-100 {
    font-size: 28px;
  }

  .ring-label {
    font-size: 12px;
    color: var(--subtext);
    margin-top: 2px;
  }

  /* ── Limit rows ── */
  .rows {
    padding: 0 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--row-bg);
    border-radius: 10px;
    padding: 9px 11px;
    transition: background 0.12s;
  }
  .row:hover { background: var(--row-hover); }

  .row-icon {
    width: 18px; height: 18px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }

  .row-name {
    flex: 1;
    font-size: 13px;
    color: var(--text);
    font-weight: 450;
  }

  .row-value {
    font-size: 13px;
    color: var(--text);
    font-weight: 600;
    text-align: right;
    white-space: nowrap;
  }

  /* ── Footer ── */
  .footer {
    border-top: 1px solid var(--border);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .last-updated {
    font-size: 11px;
    color: var(--subtext);
  }

  .settings-btn {
    font-size: 12px;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 5px;
  }
  .settings-btn:hover { background: var(--row-bg); }

  /* ── States ── */
  .empty-state {
    padding: 32px 16px;
    text-align: center;
    color: var(--subtext);
    font-size: 13px;
  }

  .setup-btn {
    margin-top: 12px;
    padding: 8px 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  .setup-btn:hover { opacity: 0.85; }

  /* Loading spinner */
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--ring-track);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }

  .error-row {
    background: rgba(248,113,113,0.12);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    color: #ef4444;
    margin: 0 12px 10px;
  }

  /* ── Sparkline ── */
  .sparkline-wrap {
    padding: 0 12px 8px;
    display: none;
  }
  .sparkline-wrap canvas {
    width: 100%;
    height: 32px;
    border-radius: 6px;
    display: block;
  }

  /* ── Offline badge ── */
  .offline-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    color: #f97316;
    background: rgba(249,115,22,0.12);
    border-radius: 4px;
    padding: 1px 5px;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* ── Overclock row ── */
  .overclock-row {
    display: none;
  }
  .overclock-row .row-name {
    font-weight: 500;
  }
  .overclock-row .row-value {
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
<div class="card">
  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <img src="../icon.png" alt=""/>
    </div>
    <span class="header-title">Claude Usage</span>
    <span class="header-account" id="accountLabel"></span>
    <div class="header-btns">
      <button class="icon-btn" id="refreshBtn" title="Refresh" aria-label="Refresh usage data">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-3.75"/>
        </svg>
      </button>
      <button class="icon-btn" id="menuBtn" title="More" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Ring chart -->
  <div class="ring-section" id="ringSection" style="display:none">
    <div class="ring-wrap">
      <svg viewBox="0 0 120 120" id="ringSvg">
        <!-- rings injected by JS -->
      </svg>
      <div class="ring-center">
        <span class="ring-pct" id="ringPct">—</span>
        <span class="ring-label">Used</span>
      </div>
    </div>
  </div>

  <!-- Error banner -->
  <div class="error-row" id="errorRow" style="display:none"></div>

  <!-- Sparkline -->
  <div class="sparkline-wrap" id="sparklineWrap">
    <canvas id="sparklineCanvas" height="32"></canvas>
  </div>

  <!-- Overclock status row -->
  <div class="rows" style="padding-bottom:4px">
    <div class="row overclock-row" id="overclockRow">
      <div class="row-icon" id="overclockIcon"></div>
      <span class="row-name" id="overclockLabel"></span>
      <span class="row-value" id="overclockCountdown"></span>
    </div>
  </div>

  <!-- Limit rows -->
  <div class="rows" id="rows"></div>

  <!-- Footer -->
  <div class="footer">
    <span class="last-updated" id="lastUpdated">—</span>
    <button class="settings-btn" id="settingsBtn">Settings</button>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
